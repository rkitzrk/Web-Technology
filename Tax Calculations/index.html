<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <form id="taxform" onsubmit="calculateTax(); return false;">
            <div class="field-row">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="field-row">
                <label for="annualIncome">Annual Income</label>
                <input type="number" id="annualIncome" name="annualIncome" min="0" value="0" required>
            </div>
            <div class="field-row">
                <label for="deductions">Deductions</label>
                <input type="number" id="deductions" name="deductions" min="0" value="0">
            </div>
            <div class="field-row small-row">
                <div>
                    <label for="from">From Year</label>
                    <select name="from" id="from">
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                    </select>
                </div>
                <div>
                    <label for="to">To Year</label>
                    <select name="to" id="to">
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                    </select>
                </div>
            </div>
            <div class="button-row">
                <input type="submit" value="Calculate Tax">
                <button type="button" onclick="clearTaxHistory()">Clear History</button>
            </div>
        </form>

        <div class="result-card" id="result-card" hidden>
            <h2>Tax Result</h2>
            <p id="answer"></p>
        </div>

        <div class="history-card">
            <h2>Fetch User Tax History</h2>
            <div class="field-row">
                <label for="history-username">Username</label>
                <input type="text" id="history-username" name="history-username" placeholder="Enter username">
            </div>
            <div class="button-row">
                <button type="button" onclick="loadTaxHistory()">Fetch History</button>
            </div>
            <ul id="history-list"></ul>
        </div>
    </div>
</body>
<script>
    const API_BASE = window.location.protocol.startsWith('http')
        ? window.location.origin
        : 'http://localhost:3000';

    async function calculateTax() {
        const username = document.getElementById('username').value.trim();
        const fromYear = document.getElementById('from').value;
        const toYear = document.getElementById('to').value;
        const annualIncome = document.getElementById('annualIncome').value;
        const deductions = document.getElementById('deductions').value;

        const payload = {
            username,
            fromYear,
            toYear,
            annualIncome,
            deductions,
        };

        try {
            const response = await fetch(`${API_BASE}/api/tax`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await response.json();

            if (!response.ok) {
                document.getElementById('result-card').hidden = false;
                document.getElementById('answer').innerText = data.error || 'Unable to calculate tax.';
                return;
            }

            document.getElementById('result-card').hidden = false;
            document.getElementById('answer').innerHTML =
                `Tax for ${data.username} (${data.fromYear}–${data.toYear})<br>` +
                `Annual Income: ₹${data.annualIncome.toLocaleString()}<br>` +
                `Deductions: ₹${data.deductions.toLocaleString()}<br>` +
                `Taxable Income: ₹${data.taxableIncome.toLocaleString()}<br>` +
                `<strong>Tax Amount: ₹${data.taxAmount.toLocaleString()}</strong><br>` +
                `Effective Rate: ${data.effectiveRate}%`;

            loadTaxHistory();
        } catch (error) {
            document.getElementById('result-card').hidden = false;
            document.getElementById('answer').innerText = 'Server error while calculating tax.';
            console.error(error);
        }
    }

    async function loadTaxHistory() {
        const username = document.getElementById('history-username').value.trim();
        const list = document.getElementById('history-list');

        if (!username) {
            list.innerHTML = '<li>Please enter a username and click Fetch History.</li>';
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/api/tax-history?username=${encodeURIComponent(username)}`);
            const history = await response.json();
            list.innerHTML = '';

            if (!response.ok) {
                list.innerHTML = `<li>${history.error || 'Unable to load history.'}</li>`;
                return;
            }

            if (!history.length) {
                list.innerHTML = '<li>No tax records found for this username.</li>';
                return;
            }

            history.forEach(record => {
                const li = document.createElement('li');
                li.innerHTML =
                    `<strong>${record.username}</strong> (${record.fromYear}–${record.toYear}): ` +
                    `Income ₹${record.annualIncome.toLocaleString()}, Tax ₹${record.taxAmount.toLocaleString()}, ` +
                    `Rate ${record.effectiveRate}%`;
                list.appendChild(li);
            });
        } catch (error) {
            list.innerHTML = '<li>Error loading tax history.</li>';
            console.error(error);
        }
    }

    async function clearTaxHistory() {
        try {
            const response = await fetch(`${API_BASE}/api/tax-history`, { method: 'DELETE' });
            const data = await response.json();
            if (!response.ok) {
                alert(data.error || 'Could not clear tax history.');
                return;
            }
            loadTaxHistory();
        } catch (error) {
            alert('Server error while clearing tax history.');
            console.error(error);
        }
    }

    loadTaxHistory();
</script>
</html>
