<html>

<head>
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f1f1f1;
        }

        .login-card {
            width: 360px;
            padding: 20px;
            text-align: center;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.35);
            background-color: #ffffff;
        }

        .btn {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn button {
            border: 2px solid cyan;
            background-color: transparent;
            color: #000000;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            flex: 1;
            min-width: 0;
        }

        .submit-btn {
            border: 2px solid cyan;
            background-color: cyan;
            color: #000000;
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn button.active {
            background-color: cyan;
        }

        input {
            border: 2px solid rgb(148, 243, 243);
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 16px;
        }

        #message {
            min-height: 24px;
            margin-bottom: 12px;
            color: #333;
        }

        #message.error {
            color: #cc0000;
        }

        #message.success {
            color: #006600;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="btn">
            <button id="login-btn" type="button" class="active" onclick="showLogin()">Login</button>
            <button id="register-btn" type="button" onclick="showRegister()">Register</button>
        </div>
        <div id="message"></div>
        <div id="form_content"></div>
    </div>

    <script>
        const messageEl = document.getElementById('message');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = type || '';
        }

        function setActiveButton(activeId) {
            document.getElementById('login-btn').classList.toggle('active', activeId === 'login-btn');
            document.getElementById('register-btn').classList.toggle('active', activeId === 'register-btn');
        }

        function showLogin() {
            setActiveButton('login-btn');
            showMessage('', '');
            const fm = document.getElementById('form_content');
            fm.innerHTML = `
                <h2>Login</h2>
                <form id="login-form" onsubmit="submitLogin(event)">
                    <input id="login-username" type="text" placeholder="Username" required>
                    <input id="login-password" type="password" placeholder="Password" required>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
            `;
        }

        function showRegister() {
            setActiveButton('register-btn');
            showMessage('', '');
            const fm = document.getElementById('form_content');
            fm.innerHTML = `
                <h2>Register</h2>
                <form id="register-form" onsubmit="submitRegister(event)">
                    <input id="register-username" type="text" placeholder="Username" required>
                    <input id="register-email" type="email" placeholder="Email" required>
                    <input id="register-password" type="password" placeholder="Password" required>
                    <input id="register-confirm-password" type="password" placeholder="Confirm Password" required>
                    <button type="submit" class="submit-btn">Register</button>
                </form>
            `;
        }

        async function submitLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Login failed.', 'error');
                return;
            }

            showMessage('Login successful. Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 500);
        }

        async function submitRegister(event) {
            event.preventDefault();
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, confirmPassword }),
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'Registration failed.', 'error');
                return;
            }

            showMessage('Registered successfully. Please login.', 'success');
            setTimeout(showLogin, 1200);
        }

        showLogin();
    </script>
</body>

</html>
